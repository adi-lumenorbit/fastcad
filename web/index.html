<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>fastcad</title>
  <link rel="stylesheet" href="/style.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "/vendor/three.module.js",
      "three/addons/controls/OrbitControls.js": "/vendor/OrbitControls.js",
      "three/addons/controls/TransformControls.js": "/vendor/TransformControls.js"
    }
  }
  </script>
  <script defer src="/vendor/rrweb.min.js"></script>
  <script defer src="/vendor/html2canvas.min.js"></script>
</head>
<body>
  <div id="app">
    <div id="viewer-pane">
      <canvas id="viewer" data-testid="viewer"></canvas>
      <div id="viewer-overlay">
        <button id="undo-btn" data-testid="undo-btn" type="button">Undo</button>
        <button id="redo-btn" data-testid="redo-btn" type="button">Redo</button>
        <button id="home-btn" data-testid="home-btn" type="button" title="Recenter view (h)">Home</button>
        <button id="export-btn" data-testid="export-btn" type="button">Export .scad</button>
        <button id="reset-btn" data-testid="reset-btn" type="button" title="Clear scene">Reset</button>
        <span class="overlay-group" data-testid="section-group">
          <button id="section-x-btn" data-testid="section-x-btn" type="button"
                  title="Cut X (key: 1)">Cut X</button>
          <button id="section-y-btn" data-testid="section-y-btn" type="button"
                  title="Cut Y (key: 2)">Cut Y</button>
          <button id="section-z-btn" data-testid="section-z-btn" type="button"
                  title="Cut Z (key: 3)">Cut Z</button>
          <button id="section-off-btn" data-testid="section-off-btn" type="button"
                  title="Section off (key: 0)">Off</button>
        </span>
      </div>
      <div id="viewer-help" data-testid="viewer-help">
        <span><b>L-drag</b> rotate</span>
        <span><b>R-drag</b> pan</span>
        <span><b>Wheel</b> zoom</span>
        <span><b>H</b> home</span>
      </div>
    </div>
    <div id="app-divider" data-testid="app-divider" role="separator"
         aria-orientation="vertical" tabindex="0"
         title="Drag to resize viewer / chat split"></div>
    <div id="chat-pane">
      <div id="chat-log" data-testid="chat-log" role="log" aria-live="polite"></div>
      <div id="ask-user-area" data-testid="ask-user-area" hidden></div>
      <div id="pane-divider" data-testid="pane-divider" role="separator"
           aria-orientation="horizontal" tabindex="0"
           title="Drag to resize chat / progress split"></div>
      <div id="progress-pane" data-testid="progress-pane">
        <div id="progress-header">
          <span class="title">Progress</span>
          <button id="progress-clear-btn" data-testid="progress-clear-btn" type="button" title="Clear progress log">Clear</button>
        </div>
        <div id="progress-panel" data-testid="progress-panel" role="log" aria-live="polite"></div>
      </div>
      <form id="chat-form">
        <span id="agent-status" data-testid="agent-status"
              data-state="idle" title="Idle">
          <span class="glyph" data-testid="agent-status-glyph">●</span>
          <span class="label" data-testid="agent-status-label">Idle</span>
        </span>
        <input id="chat-input" data-testid="chat-input" type="text"
               autocomplete="off" placeholder="Try: make a 20mm cube" />
        <button id="chat-send-btn" data-testid="chat-send-btn" type="submit">Send</button>
      </form>
      <div id="feedback-bar">
        <button id="feedback-point-btn" data-testid="feedback-point-btn" type="button"
                title="Click an element to attach feedback to it">Point</button>
        <button id="feedback-send-btn" data-testid="feedback-send-btn" type="button">Send Feedback</button>
        <span id="feedback-status" data-testid="feedback-status"></span>
      </div>
    </div>
  </div>
  <div id="vendor-warning" hidden>
    <p>Browser libraries missing under <code>web/vendor/</code>.</p>
    <p>Run <code>bash scripts/fetch-vendor.sh</code> on the WSL host then refresh.</p>
  </div>
  <script type="module" src="/main.js"></script>
  <script type="module" src="/feedback.js"></script>
</body>
</html>
