# /etc/fail2ban/filter.d/caddy-auth.conf — installed by bootstrap.sh.
#
# Matches Caddy access-log JSON entries with a 401 status. The
# `<HOST>` placeholder is fail2ban's IP-extraction marker; it
# must appear exactly once and corresponds to `client_ip`.

[Definition]
failregex = ^.*"client_ip":"<HOST>".*"status":401.*$
ignoreregex =
